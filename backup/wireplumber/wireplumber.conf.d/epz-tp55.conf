monitor.alsa.rules = [
  {
    matches = [
      {
        node.name="~alsa_output.usb-EPZ_Technology_TP55.*"
      }
    ]
    actions={
      update-props={
        #禁用硬件混音
        api.alsa.soft-mixer=true
        #忽略驱动报告的dB值，避免错误的音量映射
        api.alsa.ignore-dB=true
        #禁用UCM，避免路由干扰
        api.alsa.use-ucm=false
        audio.format="S32LE"
        audio.rate=768000
        node.max-latency=0
        audio.allowed-rates="44100, 48000, 88200, 96000, 176400, 192000, 352800, 384000, 705600, 768000"
      }
    }
  }
]
