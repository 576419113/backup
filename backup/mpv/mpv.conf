################
#  载入配置文件  #
################
#profile=720P


###############
#  音视频输出  #
###############
vo=gpu-next             #输出驱动
gpu-context=waylandvk   #显示环境
gpu-api=vulkan          #渲染后端
hwdec=auto-copy         #默认硬解
hwdec-codecs=all        #全部硬解
video-sync=display-resample     #变速音频以同步视频
audio-pitch-correction=yes      #变速音频保持音调
audio-exclusive=yes             #独占音频
volume-max=100                  #固定最大音量
audio-normalize-downmix=no      #不混音


#############
#  播放控制  #
#############
osc=no                           #禁用内置osc，启用uosc
#input-default-bindings=no       #只使用input.conf的按键绑定
load-stats-overlay=no            #禁用内置stats，使用汉化版本
log-file="~~/files/mpv.log"      #配置日志路径
save-position-on-quit=yes        #退出时记住播放状态
watch-later-dir="~~/cache/watch_later"    #播放状态配置路径
hr-seek=always        #尽可能精确搜索
keep-open=yes         #自动播放完列表，并在最后暂停


#############
#  网络缓存  #
#############
cache=yes           #启用网络缓存
cache-secs=32       #缓存32秒
cache-on-disk=yes   #缓存进磁盘
demuxer-cache-dir="~~/cache/stream_cache"


#############
#  轨道选择  #
#############
# 视频轨道
vlang=chs,sc,zh-Hans,zh-CN,cht,tc,zh-Hant,zh-HK,zh-TW,chi,zho,zh
# 音频轨道
alang=chs,sc,zh-Hans,zh-CN,cht,tc,zh-Hant,zh-HK,zh-TW,chi,zho,zh
# 字幕轨道(会被uosc继承)
slang=chs,sc,zh-Hans,zh-CN,cht,tc,zh-Hant,zh-HK,zh-TW,chi,zho,zh


###########
#  着色器  #
###########
#配置不应该写在这里，而是profile中，冒号间隔#
# 着色器缓存路径
gpu-shader-cache-dir="~~/cache/shaders_cache"
#glsl-shaders="~~/shaders/Anime4K/Deblur/Anime4K_Deblur_DoG.glsl:~~/shaders/Anime4K/Upscale/Anime4K_Upscale_CNN_x2_L.glsl"
#Anime4K介绍：
#Deblur去糊：推荐DoG高斯差分算法
#Denoise降噪：Median>Mode>Mean
#Restore压缩失真修复算法，通常与超分一同使用：
#  ClampHighlights高光抑制、DoG高斯差分去糊、AA/Soft抗锯齿
#  GAN>CNN、UUL>UL>VL>L>M>S>US
#String线条：Thin减细，Darken加粗，HQ>Fast>VeryFast
#Upscale超分：
#  AutoDownscalePre自动缩小算法(与超分相对)
#  DTD Darken-Thin-Deblur
#Upscale+Deblur


##############
#  hdr与色域  #
##############
#image-lut=""                 #图像解码期间应用lut
#image-lut-type=auto          #lut处理输入颜色：auto从文件中载入，native保留原始范围，normalized线性归一化，coversation完全替换色域映射
#lut=""                       #色彩映射的一部分
#lut-type=auto
#target-lut=""                #屏幕显示颜色之前应用lut
target-colorspace-hint=auto          #自动HDR直通
target-colorspace-hint-mode=target   #HDR直通基于目标显示器
target-prim=dci-p3         #显示器色彩空间
target-trc=gamma2.2        #显示器传输特性
target-peak=auto           #显示器峰值亮度
target-contrast=auto       #显示器对比度
target-gamut=dci-p3        #限制输出色域
hdr-reference-white=203    #SDR亮度
tone-mapping=spline        #色调映射算法
tone-mapping-param=0.30    #色调映射算法参数
gamut-mapping-mode=perceptual     #色域映射算法
hdr-compute-peak=yes       #基于场景动态色调映射
allow-delayed-peak-detect  #延迟一帧进行动态计算，提升性能
hdr-peak-percentile=99.5   #将多少百分比的值作为最亮点的值
hdr-peak-decay-rate=20     #场景亮度切换衰变率
hdr-scene-threshold-low=1.0    #亮度差异的下阈值(dB)将被视为场景更改
hdr-scene-threshold-high=3.0   #亮度差异的上阈值(dB)将被视为场景更改
hdr-contrast-recovery=0.30     #hdr对比度恢复系数
hdr-contrast-smoothness=3.5    #hdr对比度平滑系数



#############
#  视频参数  #
#############
#此参数不应该写在这里，应写入profile#
#contrast=<-100-100>        #对比度
#gamma=<-100-100>           #gamma值
#hue=<-100-100>             #色调HSV-h
#saturation=<-100-100>      #饱和度HSV-s
#brightness=<-100-100>      #亮度HSV-v


##########
#  窗口  #
##########
fullscreen                  #默认全屏
no-border                   #无边框
#autofit=70%                #自动匹配大小
autofit-larger=90%x90%      #最大大小
autofit-smaller=40%x30%     #最小大小


#############
#  配置文件  #
#############
#下方不得再出现与配置文件无关的文件#
[720P]
glsl-shaders="~~/shaders/Anime4K/Deblur/Anime4K_Deblur_DoG.glsl:~~/shaders/Anime4K/Denoise/Anime4K_Denoise_Bilateral_Mean.glsl:~~/shaders/Anime4K/Restore/Anime4K_Restore_GAN_UUL.glsl:~~/shaders/Anime4K/String/Anime4K_Thin_VeryFast.glsl:~~/shaders/Anime4K/Upscale/Anime4K_Upscale_GAN_x2_M.glsl"
