# 电池保养——充电阈值设置
# 充电开始：当电源适配器连接且当前电量低于起始阈值时
# 充电停止：当电量 高于 停止阈值时
# 硬件需求: Lenovo ThinkPads或有特定插件的其他设备:
# - 使用tlp-stat -b命令检查设备是否兼容，并查看厂商支持的阈值范围。部分厂商仅支持1 (on)/0 (off)而不是百分数
# - 双阈值支持：若硬件同时支持起始和停止阈值，必须同时设置，否则TLP会拒绝应用
# - 单阈值支持：若硬件仅支持停止阈值，需将起始值设为0
# - 电池标识：tlp-stat -b显示的电池名称可能与_BAT0或_BAT1参数不直接对应，需参考文档确认，For further explanation and all vendor specific details refer to
# [1] https://linrunner.de/tlp/settings/battery.html
# [2] https://linrunner.de/tlp/settings/bc-vendors.html

# BAT0: 主电池
# Default: <none>

# 注意：起始阈值必须小于停止阈值，否则充电功能会被禁用
# 电池电量低于此阈值时开始充电
#START_CHARGE_THRESH_BAT0=75
# 电池电量高于于此阈值时停止充电
#STOP_CHARGE_THRESH_BAT0=80

# BAT1: 次电池 (部分设备)
# Default: <none>

# 电池电量低于此阈值时开始充电
#START_CHARGE_THRESH_BAT1=75
# 电池电量高于于此阈值时停止充电
#STOP_CHARGE_THRESH_BAT1=80

# 断开交流电源时恢复默认充电阈值: 0=禁用, 1=启用
# Default: 1

#RESTORE_THRESHOLDS_ON_BAT=0

