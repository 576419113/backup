#
# 读入顺序:
# 1. 默认
# 2. /etc/tlp.d/*.conf - 模板
# 3. /etc/tlp.conf     - 此文件
# TLP profile，tlp内置的性能方案分为三部分：
# - performance: 以_AC结尾的参数且接入AC电源或tlp performance命令正在运行
# - balanced: 以_BAT结尾的参数且使用BAT电池或tlp balanced命令正在运行
# - power-saver: 以_SAV结尾的参数且tlp power-saver命令正在运行(如果没有可用的_SAV结尾的参数将使用_BTA)
# - 所有没有分开的参数将应用于所有模式
# 注意:
# - 参数覆盖，AC外电源/BAT内电源/SAV省电单独配置，否则采取相同配置
# - PARAMETER+="add values"增加参数值，值存在空格，加“”
# - “#”是注释，参数后不可有注释
# - PARAMETER=""禁用注释
# defaults解释:
# - Default *: 存在默认配置
# - Default <none>: 不处理/系统默认
#
# ------------------------------------------------------------------------------
# tlp是否启用
# 0否, 1是
# Default: 1

TLP_ENABLE=1

# 设置为1以完全禁用TLP的所有固有默认值。这意味着只有被明确激活的设置才适用，即没有前导“#”的参数。对于只想使用TLP中某些功能的人来说很有帮助。激活后，可以使用tlp-stat -c显示你的有效配置。TLP操作依赖于默认的TLP_ENABLE、TLP_WARN_LEVEL、TLP_AUTO_SWITCH和TLP_PROFILE_AC/BAT，要处于非禁用状态

#TLP_DISABLE_DEFAULTS=1

# 警告等级
#   0=禁用,
#   1=后台系统日志(boot, resume, change of power source)报告,
#   2=命令行(stderr),
#   3=1和2
# Default: 3

#TLP_WARN_LEVEL=3

# 日志美化，采用ANSI码
# 顺序"<error> <warning> <notice> <success>"
# Default: "91 93 1 92"

#TLP_MSG_COLORS="91 93 1 92"

# 控制当连接或移除充电器、系统启动或执行'tlp start'时自动切换配置：
#   0=禁用，永远不切换，使用可能被启用的TLP_PROFILE_DEFAULT
#   1=自动，选择TLP_PROFILE_AC在插入电源时，选择TLP_PROFILE_BAT在使用电池时
#   2=智能，与自动模式类似，但如果您已手动修改了默认配置文件（由TLP_PROFILE_AC/BAT定义），则跳过切换。
# 注意：如果充电器在休眠期间连接或移除时，也会同样适用。
# Default: 2

#TLP_AUTO_SWITCH=2

# TLP_AUTO_SWITCH=1/2时自动切换的TLP配置
#   PRF=performance, BAL=balanced, SAV=power-saver.
# Default: PRF (AC power), BAL (battery power)

#TLP_PROFILE_AC=BAL
#TLP_PROFILE_BAT=SAV

# TLP_AUTO_SWITCH=0、无法识别电源时的TLP默认配置
# PRF=performance，BAL=balance，SAV=power-saver。
# 注意：遗留值 AC 和 BAT 仍然有效。它们分别映射到 POWER_PROFILE 和 BALANCED。
# Default: <none>

TLP_PROFILE_DEFAULT=BAL

# 在确定TLP配置文件时要忽略的电源供应类: AC, USB, BAT
# 注意: 用于无法正确识别模式
# Default: <none>

#TLP_PS_IGNORE="BAT"

# 笔记本电脑模式在磁盘进入空闲状态后需要等待多少秒才将缓存写入磁盘
# 非0启用，0禁用
# Default: 0 (AC), 2 (BAT)

#DISK_IDLE_SECS_ON_AC=0
#DISK_IDLE_SECS_ON_BAT=2

# 缓存未写入磁盘并在内存中保留延迟写入的最长秒数
# Default: 15 (AC), 60 (BAT)

#MAX_LOST_WORK_SECS_ON_AC=15
#MAX_LOST_WORK_SECS_ON_BAT=60

# 选择 CPU 调频驱动器的运行模式
# Intel CPU与intel_pstate驱动:active主动, passive被动.
# AMD Zen 2或新CPU与amd-pstate驱动与内核6.3/6.4(*):active, passive, guided(*)引导.
# Default: <none>
CPU_DRIVER_OPMODE_ON_AC=active
CPU_DRIVER_OPMODE_ON_BAT=active
CPU_DRIVER_OPMODE_ON_SAV=active

# 选择 CPU 频率调节策略
# Intel CPU与intel_pstate驱动/AMD CPU与amd-pstate驱动active模式('amd-pstate-epp'):performance, powersave(*).
# Intel CPU与intel_pstate驱动passive模式('intel_cpufreq')/AMD CPU与amd-pstate驱动passive or guided模式('amd-pstate')/Intel, AMD，其他CPU与acpi-cpufreq驱动:conservative, ondemand(*), userspace, powersave, performance, schedutil(*).
# tlp-stat -p显示允许的配置
# 重点:
# 标有 (*) 的 governors（powersave、ondemand、schedutil）在绝大多数工作负载下都具有良好的能效表现，因此被内核和大多数发行版设为默认选项。在更改 governor 前，请务必了解其优缺点，确保符合你的使用场景需求。
# Default: <none>

CPU_SCALING_GOVERNOR_ON_AC=performance
CPU_SCALING_GOVERNOR_ON_BAT=powersave
CPU_SCALING_GOVERNOR_ON_SAV=powersave

# 设置可供调频策略使用的最低/最高 CPU 频率。
# tlp-stat -p查看允许的数值.
# 注意:
# - AC与BAT模式必须同时设置
# - 不推荐在intel_pstate驱动下使用此选项，应改用下方的CPU_MIN/MAX_PERF_ON_AC/BAT参数。
# Default: <none>

#CPU_SCALING_MIN_FREQ_ON_AC=0
#CPU_SCALING_MAX_FREQ_ON_AC=0
#CPU_SCALING_MIN_FREQ_ON_BAT=0
#CPU_SCALING_MAX_FREQ_ON_BAT=0
#CPU_SCALING_MIN_FREQ_ON_SAV=0
#CPU_SCALING_MAX_FREQ_ON_SAV=0

# 设置 CPU 能效/性能策略（EPP和EPB）：performance, balance_performance, default, balance_power, power.
# 需求:
# * Intel CPU
#   EPP: Intel Core i6 CPU和intel_pstate驱动
#   EPB: Intel Core i2 CPU和intel_pstate驱动
#   EPP和EPB互斥：若EPP可用，Intel CPU将忽略EPB。TLP仅会应用匹配的功能。
# * AMD Zen 2
#   EPP: amd-pstate驱动active模式('amd-pstate-epp') kernel 6.3
# Default: balance_performance (AC), balance_power (BAT)
# !!!!!!!! Warning警告 !!!!!!!!!
# 若系统正在使用 power-profiles-daemon，则上述默认值不会生效。请改为在/var/lib/power-profiles-daemon/state.ini 中配置，并参考以下映射关系：
#    1) "balanced"对应tlp的"balance_performance"
#    2) "power-saver"对应tlp的"power"
#    3) "performance"对应tlp的"performance"
# Default: balance_performance (AC), balance_power (BAT), power (SAV)
# !!!!!!!!!!!!!!!!!!!!!!!!!!

CPU_ENERGY_PERF_POLICY_ON_AC=performance
CPU_ENERGY_PERF_POLICY_ON_BAT=power
CPU_ENERGY_PERF_POLICY_ON_SAV=power

# 设置Intel CPU P-state性能/睿频范围: 0..100 (%)
# 通过限制最大/最小 P-state 来控制 CPU 的功耗
# 数值以可用性能的百分比表示
# 至少Intel Core i2与intel_pstate驱动
# Default: <none>

CPU_MIN_PERF_ON_AC=0
CPU_MAX_PERF_ON_AC=80
CPU_MIN_PERF_ON_BAT=0
CPU_MAX_PERF_ON_BAT=80
CPU_MIN_PERF_ON_SAV=0
CPU_MAX_PERF_ON_SAV=80

# 设置CPU "turbo boost" (Intel) 或"core performance boost" (AMD) ：0=禁用, 1=启用.
# 允许在 CPU 芯片未完全利用且未达到热设计功耗（TDP）时，提升部分核心的最大频率/P-state
# 注意：值为1时仅允许加速，而非强制激活
# Default: <none>
# !!!!!!!! Warning 警告!!!!!!!!!
# 若系统使用power-profiles-daemon，请谨慎配置此选项。当no_turbo=1时，power-profiles-daemon可能因高温限制而降低性能。
# !!!!!!!!!!!!!!!!!!!!!!!!!!

#CPU_BOOST_ON_AC=1
#CPU_BOOST_ON_BAT=1
#CPU_BOOST_ON_SAV=0

# 设置CPU动态加速：0关, 1开
# 当系统检测到之前因I/O等待而暂停的任务恢复运行时，动态提高最低P-state限制以提升性能。
# 至少Intel Core i6与intel_pstate driver与active模式
# 注意：AMD CPU目前不支持此功能调节
# Default: <none>

#CPU_HWP_DYN_BOOST_ON_AC=1
#CPU_HWP_DYN_BOOST_ON_BAT=1
#CPU_HWP_DYN_BOOST_ON_SAV=0

# 内核NMI看门狗检查无响应：0=关(默认,省电), 1开(只内核调试提供日志)
# Default: 0

#NMI_WATCHDOG=0

# 选择平台电源模式：performance, balanced, low-power
# 控制系统在电源/性能、温度和风扇速度之间的运行策略。（上述模式按省电程度递增排序）
# 注意: 使用tlp-stat -p检查硬件支持的可用模式（部分设备可能提供额外选项，如 balanced-performance、quiet、cool）
# Default: performance (AC), balanced (BAT), low-power (SAV)
# !!!!!!!! Warning 警告!!!!!!!!!
# 若系统使用 power-profiles-daemon，请直接在以下文件中配置：/var/lib/power-profiles-daemon/state.ini并参考以下映射关系：
#    1) "balanced"对应tlp的“balanced”
#    2) "power-saver"对应tlp的"low-power"
#    3) "performance"对应tlp的“performance”
# !!!!!!!!!!!!!!!!!!!!!!!!!!

PLATFORM_PROFILE_ON_AC=performance
PLATFORM_PROFILE_ON_BAT=low-power
PLATFORM_PROFILE_ON_SAV=low-power

# 系统休眠模式
#   s2idle:（空闲待机）：纯软件实现的轻量级睡眠状态，仅暂停部分硬件活动，功耗降低有限。
#   deep: 挂起到内存）：将整个系统置于低功耗状态（仅保持内存供电），通常比 s2idle 更省电。
# 警告: 更改休眠模式可能导致系统不稳定甚至数据丢失。使用tlp-stat -s检查硬件支持的休眠模式。若不确定，请保持系统默认设置（不配置此项）。
# Default: <none>

#MEM_SLEEP_ON_AC=s2idle
#MEM_SLEEP_ON_BAT=deep

# 定义以下 DISK/AHCI_RUNTIME 参数作用的磁盘设备。多个设备需用空格分隔。可通过磁盘ID指定设备（使用tlp diskid命令查询）
# Default: "nvme0n1 sda"

#DISK_DEVICES="nvme0n1 sda"

# 磁盘高级电源管理（APM）节能级别：1~254，255（最大~最小，关闭）
# 级别 1~127 可能使磁盘停转；255 在大多数硬盘上表示关闭APM
# 多个磁盘需用空格分隔值，使用特殊值keep保留磁盘的硬件默认设置
# Default: 254 (AC), 128 (BAT)

#DISK_APM_LEVEL_ON_AC="254 254"
#DISK_APM_LEVEL_ON_BAT="128 128"

# 排除以下磁盘类别的高级电源管理（APM）：sata, ata, usb, ieee1394
# 用空格间隔区分
# CAUTION 警告: 启用 APM 可能导致USB或IEEE1394磁盘挂载失败或数据损坏。修改排除列表前，请确保已备份受影响设备的数据！
# Default: "usb ieee1394"

#DISK_APM_CLASS_DENYLIST="usb ieee1394"

# 硬盘停转超时设置
#   0:禁用停转
#   1..240:超时范围5秒至20分钟（单位为5秒）
#   241..251: 超时范围30分钟至5.5小时（单位为30分钟）
# 详见man hdparm手册
# 多个磁盘需用空格分隔值，使用 keep 保留磁盘的硬件默认设置。
# Default: <none>

#DISK_SPINDOWN_TIMEOUT_ON_AC="0 0"
#DISK_SPINDOWN_TIMEOUT_ON_BAT="0 0"

# 为磁盘设备选择 I/O 调度器
# 多队列（blk-mq）调度器：mq-deadline(*), none, kyber, bfq
# 单队列调度（传统方案，内核≥5.0已移除）：deadline(*), cfq, bfq, noop
# (*)为推荐
# 多个磁盘需用空格分隔值，使用keep保留内核默认调度器。
# 注意:
# - kernels < 5.0的多队列(blk-mq)可能需要'scsi_mod.use_blk_mq=1'系统选项和模块'modprobe mq-deadline-iosched|kyber|bfq'
# - 单队列调度器：kernels≥5.0 已移除，仅适用于旧系统
# Default: keep

#DISK_IOSCHED="mq-deadline mq-deadline"

# AHCI链接电源管理（ALPM）模式（适用于 SATA 磁盘）:min_power, med_power_with_dipm(*), medium_power, max_performance
# (*) 为推荐
# 可指定多个值（用空格分隔），系统将按顺序尝试直至成功
# Default: med_power_with_dipm (AC & BAT)

#SATA_LINKPWR_ON_AC="med_power_with_dipm"
#SATA_LINKPWR_ON_BAT="med_power_with_dipm"

# 从AHCI链接电源管理（ALPM）中排除指定的SATA链接
# SATA 链接通过其主机（host）标识，格式为 hostX（如 host0）
# 使用tlp-stat -d命令查询主机编号，多个主机需用空格分隔
# Default: <none>

#SATA_LINKPWR_DENYLIST="host1"

# NVMe、SATA、ATA 和 USB 磁盘以及 SATA 端口的运行时电源管理：on=禁用（保持活动状态）, auto=启用（进入低功耗状态）
# 注意: SATA 控制器属于PCIe总线设备，其电源管理由下方的RUNTIME_PM参数控制
# Default: on (AC), auto (BAT)

#AHCI_RUNTIME_PM_ON_AC=on
#AHCI_RUNTIME_PM_ON_BAT=auto

# 磁盘进入休眠状态前的无活动时间（秒）
# 设置SATA/AHCI磁盘在持续空闲指定秒数后自动进入低功耗状态（如休眠或部分断电）
# 注意: 仅在AHCI_RUNTIME_PM_ON_AC/BAT启用时生效
# Default: 15

#AHCI_RUNTIME_PM_TIMEOUT=15

# UltraBay/MediaBay内光驱电源控制：0=禁用（保持供电）, 1=启用（闲置断电）
# 断电后可通过弹出托盘并重新推入或按光驱面板上的弹出按钮（新机型支持）重新通电
# 注意：UltraBay/MediaBay中的硬盘不受此设置影响（永不断电）。
# Default: 0

#BAY_POWEROFF_ON_AC=0
#BAY_POWEROFF_ON_BAT=0

# 指定要断电的光驱
# Default: sr0

#BAY_DEVICE="sr0"

# Intel GPU电源管理。选择配置文件为Intel Xe GPU: base, power_saving.
# 注意: 需要Intel Xe驱动。
# Default: base (AC), power_saving (BAT), power_saving (SAV)

# INTEL_GPU_POWER_PROFILE_ON_AC=base
# INTEL_GPU_POWER_PROFILE_ON_BAT=base
# INTEL_GPU_POWER_PROFILE_ON_SAV=power_saving

# 设置Intel集成显卡的最低/最高/睿频频率
# 驱动支持如下：
# - i915驱动支持min, max与turbo(boost)
# - xe驱动只支持min与max
# Default: <none>

#INTEL_GPU_MIN_FREQ_ON_AC=0
#INTEL_GPU_MIN_FREQ_ON_BAT=0
#INTEL_GPU_MIN_FREQ_ON_SAV=0
#INTEL_GPU_MAX_FREQ_ON_AC=0
#INTEL_GPU_MAX_FREQ_ON_BAT=0
#INTEL_GPU_MAX_FREQ_ON_SAV=0
#INTEL_GPU_BOOST_FREQ_ON_AC=0
#INTEL_GPU_BOOST_FREQ_ON_BAT=0
#INTEL_GPU_BOOST_FREQ_ON_SAV=0

# AMD GPU电源管理
# 偏好(DPM): auto, low, high; 推荐auto
# 注意: 需要amdgpu或radeon驱动
# Default: auto (AC), auto (BAT), low (SAV)

#RADEON_DPM_PERF_LEVEL_ON_AC=auto
#RADEON_DPM_PERF_LEVEL_ON_BAT=auto
#RADEON_DPM_PERF_LEVEL_ON_SAV=low

# AMD显示屏自适应背光调节（ABM）级别: 0(关), 1..4.
# 1~4 控制 ABM 算法允许的最大亮度降低程度，数值越大省电效果越强（1最弱，4最强）。
# 注意:
# - 需AMD Vega或更新架构的显卡和Kernel≥6.9的amdgpu驱动支持
# - 省电效果会牺牲色彩准确性
# Default: 0 (AC), 1 (BAT), 3 (SAV)

#AMDGPU_ABM_LEVEL_ON_AC=0
#AMDGPU_ABM_LEVEL_ON_BAT=1
#AMDGPU_ABM_LEVEL_ON_SAV=3

# Wi-Fi省电模式: on=开, off=关.
# Default: off (AC), on (BAT)

#WIFI_PWR_ON_AC=off
#WIFI_PWR_ON_BAT=on

# 禁用Wake-on-LAN网络唤醒: Y/N.
# Default: Y

#WOL_DISABLE=Y

# 为Intel HDA和AC97音频设备启用节能模式（超时时间：秒）
# 0禁用, >=1启用
# 注意: 使用PulseAudio的Linux桌面环境建议设为1。未使用PulseAudio的系统可能需要设为 10。
# Default: 1

#SOUND_POWER_SAVE_ON_AC=1
#SOUND_POWER_SAVE_ON_BAT=1

# 是否同时禁用音频控制器（仅限 HDA）: Y/N.
# 注意：仅在SOUND_POWER_SAVE_ON_AC/BAT启用时生效
# Default: Y

#SOUND_POWER_SAVE_CONTROLLER=Y

# PCIe主动状态电源管理（ASPM）:default(*), performance, powersave, powersupersave.
# 注意：标有(*)的选项为推荐值，保留BIOS的原始ASPM配置
# Default: default

#PCIE_ASPM_ON_AC=default
#PCIE_ASPM_ON_BAT=default
#PCIE_ASPM_ON_SAV=default

# PCIe总线设备的运行时电源管理：on=禁用电源管理（始终保持活动状态），auto=启用电源管理（空闲时自动节能）
# Default: on (AC), auto (BAT)

#RUNTIME_PM_ON_AC=on
#RUNTIME_PM_ON_BAT=auto

# 将指定的PCIe设备地址排除在自动挂起之外
# 注意：此选项会保留内核驱动的默认设置，若需强制启用/禁用，请改用 RUNTIME_PM_ENABLE/DISABLE，多个设备地址需用空格分隔，可通过lspci命令获取地址（第一列）
# Default: <none>

#RUNTIME_PM_DENYLIST="11:22.3 44:55.6"

# 将指定驱动绑定的PCIe设备排除在自动挂起之外
# 注意：此选项会保留内核驱动的默认设置，若需强制启用/禁用，请改用RUNTIME_PM_ENABLE/DISABLE。多个驱动名称需用空格分隔。
# Default: "amdgpu mei_me nouveau nvidia xhci_hcd", use "" to disable completely.

#RUNTIME_PM_DRIVER_DENYLIST="amdgpu mei_me nouveau nvidia xhci_hcd"

# 永久启用/禁用指定PCIe设备地址的自动挂起（与电源状态无关）。此设置优先级高于所有其他自动挂起配置。多个设备地址需用空格分隔，可通过lspci命令获取地址（第一列）。
# Default: <none>

#RUNTIME_PM_ENABLE="11:22.3"
#RUNTIME_PM_DISABLE="44:55.6"

# USB自动挂起，0禁用, 1启用
# Default: 1

#USB_AUTOSUSPEND=1

# 将指定的USB设备排除在自动挂起功能之外（多个设备用空格分隔）。使用lsusb命令获取设备 ID。
# 注意：输入设备（如键盘/鼠标，驱动为 usbhid）和支持libsane的扫描仪会被自动排除
# Default: <none>

#USB_DENYLIST="1111:2222 3333:4444"

# 将音频设备排除在USB自动挂起功能之外：0=不排除, 1=排除
# Default: 1

#USB_EXCLUDE_AUDIO=1

# 将蓝牙设备排除在USB自动挂起功能之外：0=不排除, 1=排除
# Default: 0

#USB_EXCLUDE_BTUSB=0

# 将手机设备排除在USB自动挂起功能之外：0=不排除, 1=排除（允许充电）
# Default: 0

#USB_EXCLUDE_PHONE=0

# 将指针设备排除在USB自动挂起功能之外：0=不排除, 1=排除
# Default: 1

#USB_EXCLUDE_PRINTER=1

# 将WWAN移动网络设备排除在USB自动挂起功能之外：0=不排除, 1=排除
# Default: 0

#USB_EXCLUDE_WWAN=0

